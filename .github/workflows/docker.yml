name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Metadata
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then version="main"; fi
          short="${GITHUB_SHA::12}"
          upstream="$(git rev-parse --short=12 v1.0.0-rc.10 2>/dev/null || true)"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/newapi-compat-image"
          {
            echo "version=$version"
            echo "short=$short"
            echo "upstream=$upstream"
            echo "image=$image"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
            UPSTREAM_REF=${{ steps.meta.outputs.upstream }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:main
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      - name: Digest
        run: echo "digest=${{ steps.build.outputs.digest }}"
