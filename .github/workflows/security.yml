name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret patterns
        run: |
          sh scripts/secret-scan.sh
          ! git ls-files | grep -E '(^|/)(Token|github-auth\.env|server-access\.env|\.env|id_rsa|.*\.pem)$'
      - name: Docker context guard
        run: |
          docker buildx create --use
          docker buildx build --load -t context-guard:test .
          id="$(docker create context-guard:test)"
          docker export "$id" | tar -t > image-files.txt
          ! grep -E '(^|/)Token(/|$)|(^|/)(github-auth\.env|server-access\.env|\.env|id_rsa[^/]*|[^/]*\.secret|[^/]*\.local\.env)$' image-files.txt
          docker rm "$id"
