name: Build NewAPI source image package

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag. Defaults to v1.0.0-rc.11."
        required: false
        type: string
      create_release:
        description: "Create a GitHub Release with the image tarball."
        required: false
        type: boolean
        default: true
      release_tag:
        description: "Optional release tag. Defaults to newapi-source-<image tag>."
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: newapi-source-image-package
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      tarball: ${{ steps.meta.outputs.tarball }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          short="${GITHUB_SHA::12}"
          raw_tag="${INPUT_IMAGE_TAG:-v1.0.0-rc.11}"
          tag="$(printf '%s' "$raw_tag" | tr -c 'A-Za-z0-9_.-' '-')"
          tag="${tag%-}"
          if [ -z "$tag" ]; then
            tag="v1.0.0-rc.11"
          fi
          release_tag="${INPUT_RELEASE_TAG:-newapi-source-$tag}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/newapi-compat-image"
          tarball="newapi-compat-image-${tag}-linux-amd64.tar.gz"
          {
            echo "short=$short"
            echo "tag=$tag"
            echo "release_tag=$release_tag"
            echo "image=$image"
            echo "tarball=$tarball"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
            UPSTREAM_REF=v1.0.0-rc.11
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Export linux/amd64 image tarball
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          TARBALL: ${{ steps.meta.outputs.tarball }}
          CREATED: ${{ steps.meta.outputs.created }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --build-arg "VERSION=$TAG" \
            --build-arg "COMMIT_SHA=$GITHUB_SHA" \
            --build-arg "BUILD_DATE=$CREATED" \
            --build-arg "UPSTREAM_REF=v1.0.0-rc.11" \
            -t "$IMAGE:$TAG-amd64-package" \
            .
          docker save "$IMAGE:$TAG-amd64-package" | gzip -9 > "release-assets/$TARBALL"
          cp compose.yaml docker-compose.yml .env.example release-assets/
          (
            cd release-assets
            sha256sum "$TARBALL" compose.yaml docker-compose.yml .env.example > CHECKSUMS.txt
          )

      - name: Prepare release notes
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cat > release-assets/RELEASE_NOTES.md <<EOF
          Image: ${IMAGE}:${TAG}
          Digest: ${DIGEST}
          Source commit: ${GITHUB_SHA}
          Upstream tag baseline: v1.0.0-rc.11

          This package is built directly from the source fork.
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.tarball }}
          path: release-assets/
          retention-days: 7

      - name: Create GitHub Release
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: NewAPI source image ${{ steps.meta.outputs.tag }}
          body_path: release-assets/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-assets/${{ steps.meta.outputs.tarball }}
            release-assets/compose.yaml
            release-assets/docker-compose.yml
            release-assets/.env.example
            release-assets/CHECKSUMS.txt
