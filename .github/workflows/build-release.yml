name: Build NewAPI compat release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Optional upstream NewAPI tag, for example v1.0.0-rc.10"
        required: false
        type: string
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  packages: write

concurrency:
  group: newapi-compat-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_API: https://api.github.com
    steps:
      - name: Build and publish patched images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_UPSTREAM_TAG: ${{ inputs.upstream_tag }}
        run: |
          set -euo pipefail

          api_get() {
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          api_post_json() {
            local url="$1"
            local body_file="$2"
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              --data-binary @"${body_file}" \
              "$url"
          }

          api_delete() {
            local url="$1"
            curl -fsSL \
              -X DELETE \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url"
          }

          upload_asset() {
            local upload_url="$1"
            local file="$2"
            local name
            name="$(basename "$file")"
            echo "Uploading ${name}"
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${file}" \
              "${upload_url}?name=${name}"
          }

          echo "Cloning patch repository without Node-based actions"
          git clone --depth 1 --single-branch --branch main \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" patch-repo

          echo "Detecting latest upstream NewAPI release"
          if [ -n "${REQUESTED_UPSTREAM_TAG:-}" ]; then
            upstream_tag="${REQUESTED_UPSTREAM_TAG}"
          else
            upstream_json="$(api_get "${GH_API}/repos/QuantumNous/new-api/releases/latest")"
            upstream_tag="$(jq -r '.tag_name // empty' <<<"${upstream_json}")"
          fi
          if [ -z "${upstream_tag}" ]; then
            echo "Failed to detect upstream release tag" >&2
            exit 1
          fi

          release_tag="newapi-compat-${upstream_tag}"
          release_lookup_file="$(mktemp)"
          release_code="$(curl -sS -o "${release_lookup_file}" -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GH_API}/repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}")"
          if [ "${release_code}" = "200" ]; then
            if [ -n "${REQUESTED_UPSTREAM_TAG:-}" ]; then
              echo "Release ${release_tag} already exists; manual run will replace it."
              release_id="$(jq -r '.id' "${release_lookup_file}")"
              api_delete "${GH_API}/repos/${GITHUB_REPOSITORY}/releases/${release_id}" || true
              api_delete "${GH_API}/repos/${GITHUB_REPOSITORY}/git/refs/tags/${release_tag}" || true
            else
              echo "Release ${release_tag} already exists, nothing to do."
              exit 0
            fi
          fi

          echo "Downloading upstream source ${upstream_tag}"
          mkdir -p work out
          curl -fsSL -o work/upstream.zip "https://github.com/QuantumNous/new-api/archive/refs/tags/${upstream_tag}.zip"
          unzip -q work/upstream.zip -d work/upstream
          upstream_dir="$(find work/upstream -maxdepth 1 -type d -name 'new-api-*' | head -n 1)"
          if [ -z "${upstream_dir}" ]; then
            echo "Failed to locate extracted upstream source directory" >&2
            exit 1
          fi

          build_variant() {
            local variant="$1"
            local patch_file="$2"
            local image_name="$3"
            local archive_name="$4"

            local build_dir="work/build-${variant}"
            rm -rf "${build_dir}"
            cp -a "${upstream_dir}" "${build_dir}"
            cd "${build_dir}"
            git init -q -b main
            if ! git apply --check "${GITHUB_WORKSPACE}/patch-repo/${patch_file}"; then
              echo "::error::Patch does not apply cleanly to ${upstream_tag}: ${patch_file}"
              echo "Recent patch headers:"
              grep -nE '^(diff --git|@@ )' "${GITHUB_WORKSPACE}/patch-repo/${patch_file}" | tail -n 80 || true
              exit 1
            fi
            git apply "${GITHUB_WORKSPACE}/patch-repo/${patch_file}"
            printf '%s\n' "${upstream_tag}" > VERSION

            local image_tag="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${image_name}:${upstream_tag}"
            echo "Building Docker image ${image_tag}"
            docker build -t "${image_tag}" .
            docker push "${image_tag}"

            cd "${GITHUB_WORKSPACE}"
            docker save "${image_tag}" | gzip -9 > "out/${archive_name}-${upstream_tag}.tar.gz"
            echo "${image_tag}" > "out/${variant}.image-tag"
          }

          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

          build_variant "runtime" "newapi-runtime-compat.patch" "newapi-runtime-compat" "newapi-runtime-compat-docker-image"
          build_variant "homepage" "newapi-runtime-compat-with-homepage.patch" "newapi-runtime-compat-homepage" "newapi-runtime-compat-homepage-docker-image"

          cp "patch-repo/newapi-runtime-compat.patch" "out/"
          cp "patch-repo/newapi-runtime-compat-with-homepage.patch" "out/"
          cp "patch-repo/SHA256SUMS.txt" "out/"

          runtime_image_tag="$(cat out/runtime.image-tag)"
          homepage_image_tag="$(cat out/homepage.image-tag)"
          {
            echo "Upstream version: ${upstream_tag}"
            echo "Runtime compat image tag: ${runtime_image_tag}"
            echo "Runtime compat + homepage image tag: ${homepage_image_tag}"
            echo
            echo "这个 Release 同时包含两个镜像："
            echo "- 普通功能补丁镜像：newapi-runtime-compat-docker-image-${upstream_tag}.tar.gz"
            echo "- 功能补丁 + 首页美化镜像：newapi-runtime-compat-homepage-docker-image-${upstream_tag}.tar.gz"
          } > out/RELEASE_NOTES.md

          sha256sum \
            "out/newapi-runtime-compat-docker-image-${upstream_tag}.tar.gz" \
            "out/newapi-runtime-compat-homepage-docker-image-${upstream_tag}.tar.gz" \
            "out/newapi-runtime-compat.patch" \
            "out/newapi-runtime-compat-with-homepage.patch" \
            "out/SHA256SUMS.txt" \
            "out/RELEASE_NOTES.md" > "out/ARTIFACTS.SHA256SUMS"

          echo "Creating GitHub release ${release_tag}"
          jq -n \
            --arg tag_name "${release_tag}" \
            --arg name "NewAPI compat images ${upstream_tag}" \
            --rawfile body out/RELEASE_NOTES.md \
            '{tag_name:$tag_name, name:$name, body:$body, draft:false, prerelease:false}' \
            > out/release.json
          release_json="$(api_post_json "${GH_API}/repos/${GITHUB_REPOSITORY}/releases" out/release.json)"
          upload_url="$(jq -r '.upload_url | sub("\\{\\?name,label\\}$"; "")' <<<"${release_json}")"
          if [ -z "${upload_url}" ] || [ "${upload_url}" = "null" ]; then
            echo "Failed to get release upload URL" >&2
            exit 1
          fi

          upload_asset "${upload_url}" "out/newapi-runtime-compat-docker-image-${upstream_tag}.tar.gz" > /dev/null
          upload_asset "${upload_url}" "out/newapi-runtime-compat-homepage-docker-image-${upstream_tag}.tar.gz" > /dev/null
          upload_asset "${upload_url}" "out/newapi-runtime-compat.patch" > /dev/null
          upload_asset "${upload_url}" "out/newapi-runtime-compat-with-homepage.patch" > /dev/null
          upload_asset "${upload_url}" "out/SHA256SUMS.txt" > /dev/null
          upload_asset "${upload_url}" "out/ARTIFACTS.SHA256SUMS" > /dev/null
          upload_asset "${upload_url}" "out/RELEASE_NOTES.md" > /dev/null

          echo "Done: ${release_tag}"
